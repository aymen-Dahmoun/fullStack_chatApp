<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebRTC Phone-to-Browser Test (Caller + Callee)</title>
    <style>
      body {
        background: #0b0b0b;
        color: #f5f5f5;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 16px;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 12px;
      }
      input {
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #333;
        background: #101010;
        color: #f5f5f5;
        min-width: 240px;
      }
      button {
        padding: 8px 12px;
        border-radius: 6px;
        border: 0;
        background: #16a34a;
        color: #fff;
        cursor: pointer;
      }
      button.secondary {
        background: #ef4444;
      }
      button.ghost {
        background: transparent;
        border: 1px solid #333;
      }
      video {
        width: 100%;
        max-width: 640px;
        border-radius: 12px;
        background: #111;
      }
      pre {
        background: #111;
        padding: 10px;
        border-radius: 8px;
        max-height: 240px;
        overflow: auto;
      }
      .status {
        font-size: 14px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <h2>WebRTC Phone-to-Browser Test (Caller + Callee)</h2>

    <div class="row">
      <label for="socketUrl">Socket URL</label>
      <input id="socketUrl" value="http://192.168.1.33:3000" />
    </div>

    <div class="row">
      <label for="token">JWT Token</label>
      <input id="token" placeholder="Paste token from phone logs" />
      <button id="connectBtn">Connect</button>
      <button id="disconnectBtn" class="secondary">Disconnect</button>
    </div>

    <div class="row">
      <div id="userInfo" class="status"></div>
    </div>

    <div class="row">
      <label for="calleeId">Callee ID</label>
      <input id="calleeId" placeholder="target user id (callee)" />
      <button id="callBtn">Call</button>
      <button id="endCallBtn" class="secondary">End Call</button>
      <button id="hangupLocalBtn" class="ghost">Hangup Local</button>
    </div>

    <div class="row">
      <div>
        <h3>Local Stream</h3>
        <video
          id="local"
          autoplay
          playsinline
          muted
          style="
            width: 100%;
            max-width: 320px;
            border-radius: 12px;
            background: #111;
          "
        ></video>
        <div class="row" style="margin-top: 8px; gap: 8px">
          <button id="toggleAudioBtn">Mute Audio</button>
          <button id="toggleVideoBtn">Stop Video</button>
        </div>
      </div>
      <div>
        <h3>Remote Stream</h3>
        <video
          id="remote"
          autoplay
          playsinline
          controls
          style="
            width: 100%;
            max-width: 320px;
            border-radius: 12px;
            background: #111;
          "
        ></video>
      </div>
    </div>

    <pre id="log"></pre>

    <script>
      /**********************************************
       * WebRTC Phone-to-Browser: Caller + Callee
       * - Caller uses "offer" event to send offer:
       *    socket.emit("offer", { to: calleeId, offer });
       * - Server must forward "offer" to callee (your mobile app)
       * - Callee answers by emitting "answer" -> caller listens and sets remote desc
       * - ICE candidates exchanged via "ice-candidate"
       **********************************************/

      const logEl = document.getElementById("log");
      const socketUrlInput = document.getElementById("socketUrl");
      const tokenInput = document.getElementById("token");
      const connectBtn = document.getElementById("connectBtn");
      const disconnectBtn = document.getElementById("disconnectBtn");
      const remoteVideo = document.getElementById("remote");
      const localVideo = document.getElementById("local");
      const toggleAudioBtn = document.getElementById("toggleAudioBtn");
      const toggleVideoBtn = document.getElementById("toggleVideoBtn");
      const userInfoEl = document.getElementById("userInfo");
      const callBtn = document.getElementById("callBtn");
      const endCallBtn = document.getElementById("endCallBtn");
      const hangupLocalBtn = document.getElementById("hangupLocalBtn");
      const calleeIdInput = document.getElementById("calleeId");

      let playInFlight = false;
      let lastStreamId = null;
      let localStream = null;
      let audioEnabled = true;
      let videoEnabled = true;

      // WebAudio-based ringtone (outgoing)
      let audioCtx = null;
      let ringtoneOsc = null;
      function startRingtone() {
        try {
          if (!audioCtx)
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          stopRingtone();
          ringtoneOsc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          ringtoneOsc.type = "sine";
          ringtoneOsc.frequency.value = 620;
          gain.gain.value = 0.02;
          ringtoneOsc.connect(gain);
          gain.connect(audioCtx.destination);

          ringtoneOsc.start();

          // slight modulation
          setTimeout(() => {
            if (ringtoneOsc) ringtoneOsc.frequency.value = 520;
          }, 400);
        } catch (e) {
          log("Ringtone start failed: " + e.message);
        }
      }
      function stopRingtone() {
        try {
          if (ringtoneOsc) {
            try {
              ringtoneOsc.stop();
            } catch (e) {}
            ringtoneOsc.disconnect();
            ringtoneOsc = null;
          }
        } catch (e) {
          /* ignore */
        }
      }

      const safePlay = () => {
        if (playInFlight || !remoteVideo.srcObject) return;
        playInFlight = true;
        const playPromise = remoteVideo.play();
        if (playPromise && typeof playPromise.then === "function") {
          playPromise
            .then(() => {
              log("Video playback started");
            })
            .catch((err) => {
              log(`Autoplay/playback issue: ${err.message}`);
            })
            .finally(() => {
              playInFlight = false;
            });
        } else {
          playInFlight = false;
        }
      };

      let socket = null;
      let pc = null;
      let currentPeerId = null; // remote peer's user id
      const pendingCandidates = [];

      const log = (msg) => {
        const timestamp = new Date().toISOString();
        logEl.textContent = `[${timestamp}] ${msg}\n` + logEl.textContent;
      };

      const ICE_SERVERS = [
        { urls: "stun:stun.cloudflare.com:3478" },
        {
          urls: [
            "turn:turn.cloudflare.com:3478?transport=udp",
            "turn:turn.cloudflare.com:3478?transport=tcp",
            "turns:turn.cloudflare.com:5349?transport=tcp",
          ],
          username:
            "g0bb58cb25ecf569a219f2cb2bca0043815dbc0f79bb77ebf722de161d898568",
          credential:
            "f99d648bf2d8b651ab39ecfd6db8b393b0a19c3df668a8b1987358d16a62b6d5",
        },
      ];

      // Create or re-create the RTCPeerConnection
      const createPeerConnection = () => {
        if (pc) return;
        pc = new RTCPeerConnection({
          iceServers: ICE_SERVERS,
        });

        pc.ontrack = (event) => {
          const stream = event.streams[0];
          if (!stream) {
            log("Track received but stream is missing");
            return;
          }

          if (lastStreamId !== stream.id) {
            lastStreamId = stream.id;
            remoteVideo.srcObject = stream;
            log(`Remote stream set: ${stream.id}`);

            if (remoteVideo.readyState === remoteVideo.HAVE_ENOUGH_DATA) {
              safePlay();
            } else {
              remoteVideo.onloadedmetadata = () => {
                log("Remote metadata loaded");
                safePlay();
              };
            }
          }

          log("Remote track received");
          safePlay();
        };

        pc.onicecandidate = (event) => {
          if (event.candidate && socket && currentPeerId) {
            socket.emit("ice-candidate", {
              to: currentPeerId,
              candidate: event.candidate,
            });
            log("Sent ICE candidate to " + currentPeerId);
          }
        };

        pc.onconnectionstatechange = () => {
          log(`Connection state: ${pc.connectionState}`);
          if (
            pc.connectionState === "failed" ||
            pc.connectionState === "closed"
          ) {
            log("Connection lost/closed, clearing remote video");
            remoteVideo.srcObject = null;
          }
        };

        pc.oniceconnectionstatechange = () => {
          log(`ICE connection state: ${pc.iceConnectionState}`);
        };

        log("PeerConnection created");
      };

      const applyPendingCandidates = async () => {
        while (pendingCandidates.length > 0) {
          const candidate = pendingCandidates.shift();
          try {
            await pc.addIceCandidate(candidate);
            log("Applied pending candidate");
          } catch (err) {
            log("Failed to apply pending candidate: " + err.message);
          }
        }
      };

      const getLocalStream = async () => {
        try {
          if (localStream) {
            log("Local stream already initialized");
            return localStream;
          }

          localStream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true,
          });

          localVideo.srcObject = localStream;
          log("Local stream acquired and displayed");
          return localStream;
        } catch (err) {
          log(`Error getting local stream: ${err.message}`);
          return null;
        }
      };

      const toggleAudio = () => {
        if (!localStream) return;
        const audioTracks = localStream.getAudioTracks();
        audioEnabled = !audioEnabled;
        audioTracks.forEach((track) => {
          track.enabled = audioEnabled;
        });
        toggleAudioBtn.textContent = audioEnabled
          ? "Mute Audio"
          : "Unmute Audio";
        log(`Audio ${audioEnabled ? "enabled" : "disabled"}`);
      };

      const toggleVideo = () => {
        if (!localStream) return;
        const videoTracks = localStream.getVideoTracks();
        videoEnabled = !videoEnabled;
        videoTracks.forEach((track) => {
          track.enabled = videoEnabled;
        });
        toggleVideoBtn.textContent = videoEnabled
          ? "Stop Video"
          : "Start Video";
        log(`Video ${videoEnabled ? "enabled" : "disabled"}`);
      };

      // ---------- Socket connect / handlers ----------
      const connectSocket = () => {
        if (socket) return;
        const socketUrl = socketUrlInput.value.trim();
        const token = tokenInput.value.trim();

        if (!socketUrl || !token) {
          log("Socket URL and token are required.");
          return;
        }

        // decode token for UI (optional)
        try {
          const payload = JSON.parse(atob(token.split(".")[1]));
          userInfoEl.textContent = `Token user: ${payload.username || payload.sub || ""} (${payload.id || payload.sub || "?"})`;
        } catch (err) {
          userInfoEl.textContent = "Token user: unable to decode";
        }

        const script = document.createElement("script");
        script.src = `${socketUrl}/socket.io/socket.io.js`;
        script.onload = () => {
          socket = io(socketUrl, {
            auth: { token },
            transports: ["websocket"],
          });

          socket.on("connect", () => {
            log(`Connected: ${socket.id}`);
          });

          socket.on("connect_error", (err) => {
            log(`Connect error: ${err && err.message ? err.message : err}`);
          });

          // --- Caller: receives answer from callee ---
          socket.on("answer", async (data) => {
            try {
              log(`Answer received from ${data?.from}`);
              if (!pc) {
                log("No peerconnection, creating one");
                createPeerConnection();
              }
              const remoteDesc = new RTCSessionDescription(data.answer);
              await pc.setRemoteDescription(remoteDesc);
              await applyPendingCandidates();
              stopRingtone();
              log("Remote description (answer) set");
            } catch (err) {
              log("Error handling answer: " + err.message);
            }
          });

          // --- Callee: we already had "offer" handler earlier, but keep here to be safe ---
          socket.on("offer", async (data) => {
            // If you want to auto-answer in browser (not recommended for production),
            // you could implement auto-answer behavior here. Currently we keep your previous handler.
            try {
              log(`Offer received from ${data?.from}`);
              currentPeerId = data.from;
              createPeerConnection();

              const stream = await getLocalStream();
              if (stream) {
                stream.getTracks().forEach((track) => {
                  pc.addTrack(track, stream);
                });
                log(
                  "Local tracks added to peer connection (callee flow in browser)",
                );
              }

              await pc.setRemoteDescription(
                new RTCSessionDescription(data.offer),
              );
              await applyPendingCandidates();

              const answer = await pc.createAnswer();
              await pc.setLocalDescription(answer);

              socket.emit("answer", { to: currentPeerId, answer });
              log("Answer sent (browser callee)");
            } catch (err) {
              log("Error in browser offer handler: " + err.message);
            }
          });

          socket.on("ice-candidate", async (data) => {
            const candidate = new RTCIceCandidate(data.candidate);
            if (!pc) {
              pendingCandidates.push(candidate);
              log("Queued ICE candidate");
              return;
            }
            try {
              await pc.addIceCandidate(candidate);
              log("Added ICE candidate");
            } catch (err) {
              log("ICE add error: " + err.message);
            }
          });

          socket.on("call-ended", () => {
            log("Call ended");
            cleanupCall();
          });

          socket.on("call-rejected", (data) => {
            log(`Call rejected: ${data?.reason || "unknown"}`);
            cleanupCall();
          });
        };
        script.onerror = () => {
          log("Failed to load socket.io client script.");
        };

        document.head.appendChild(script);
      };

      const disconnectSocket = () => {
        if (socket) {
          try {
            socket.disconnect();
          } catch (e) {}
          socket = null;
          log("Socket disconnected");
        }
        cleanupCall();
        if (localStream) {
          try {
            localStream.getTracks().forEach((track) => track.stop());
          } catch (e) {}
          localStream = null;
          localVideo.srcObject = null;
        }
        userInfoEl.textContent = "";
      };

      // ---------- Caller: send offer ----------
      const startCallAsCaller = async () => {
        const calleeId = calleeIdInput.value.trim();
        if (!socket) {
          log("Socket not connected");
          return;
        }
        if (!calleeId) {
          log("Provide callee id");
          return;
        }

        // prepare PC
        createPeerConnection();
        currentPeerId = calleeId;

        // get local stream and add tracks
        const stream = await getLocalStream();
        if (stream) {
          stream.getTracks().forEach((track) => {
            pc.addTrack(track, stream);
          });
          log("Local tracks added to PeerConnection (caller)");
        }

        try {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);

          // Send the offer to server (server should forward to callee)
          socket.emit("offer", {
            to: calleeId,
            offer, // full RTCSessionDescription
          });

          log("Offer created and sent to " + calleeId);
          // start ringtone for outgoing call (will stop when answer arrives)
          startRingtone();
        } catch (err) {
          log("Error creating/sending offer: " + err.message);
        }
      };

      // ---------- End / cleanup ----------
      const cleanupCall = () => {
        stopRingtone();
        try {
          if (pc) {
            try {
              pc.getSenders().forEach((s) => s.track && s.track.stop());
            } catch (e) {}
            pc.close();
          }
        } catch (e) {
          // ignore
        }
        pc = null;
        currentPeerId = null;
        lastStreamId = null;
        if (remoteVideo) remoteVideo.srcObject = null;
        log("Call cleaned up");
      };

      // Hangup local tracks only (keeps pc open) - helpful while debugging
      const hangupLocal = () => {
        if (!localStream) return;
        try {
          localStream.getTracks().forEach((t) => t.stop());
        } catch (e) {}
        localStream = null;
        localVideo.srcObject = null;
        log("Local media stopped (hangup local)");
      };

      // End / notify remote
      const endCall = () => {
        if (socket && currentPeerId) {
          socket.emit("end-call", { to: currentPeerId });
        }
        cleanupCall();
      };

      // ---------- UI hooks ----------
      connectBtn.addEventListener("click", connectSocket);
      disconnectBtn.addEventListener("click", disconnectSocket);
      toggleAudioBtn.addEventListener("click", toggleAudio);
      toggleVideoBtn.addEventListener("click", toggleVideo);
      callBtn.addEventListener("click", startCallAsCaller);
      endCallBtn.addEventListener("click", endCall);
      hangupLocalBtn.addEventListener("click", hangupLocal);
      document.body.addEventListener("click", safePlay);

      // -------------------------
      // Quick usage notes (visible in logs)
      // -------------------------
      log("Page loaded. Fill socket URL + token then Connect.");
      log(
        "To call: enter callee id and press Call. When finished press End Call.",
      );
      log(
        "This page sends 'offer' events and listens for 'answer' and 'ice-candidate'.",
      );
    </script>
  </body>
</html>
